# Visualization Style Configuration for LCA Toolkit
# Publication-quality settings for journal submission

# Matplotlib configuration
matplotlib:
  figure:
    dpi: 300
    figsize: [6.5, 4.5]  # Width, height in inches (standard journal column width)
    facecolor: white
    edgecolor: white

  font:
    family: serif
    size: 10
    serif: [Times New Roman, DejaVu Serif, Bitstream Vera Serif, Computer Modern Roman, New Century Schoolbook, Century Schoolbook L, Utopia, ITC Bookman, Bookman, Nimbus Roman No9 L, Times, Palatino, Charter, serif]

  axes:
    labelsize: 10
    titlesize: 11
    linewidth: 0.8
    grid: true
    axisbelow: true

  grid:
    alpha: 0.3
    linestyle: '--'
    linewidth: 0.5

  legend:
    fontsize: 9
    frameon: true
    fancybox: false
    edgecolor: black
    framealpha: 1.0

  savefig:
    dpi: 300
    format: png

# Colorblind-safe color palettes
# Based on Paul Tol's qualitative color schemes
colors:
  # Lifecycle phase colors (4 colors for L1-L4)
  lifecycle_phases:
    l1_manufacturing: "#4477AA"      # Blue
    l2_transport: "#66CCEE"           # Cyan
    l3_o_and_m: "#228833"             # Green
    l4_eol: "#CCBB44"                 # Yellow

  # Structure type colors (6 colors for different turbine types)
  structure_types:
    onshore: "#4477AA"                # Blue
    bottom_fixed: "#66CCEE"           # Cyan
    semisubmersible: "#228833"        # Green
    spar: "#CCBB44"                   # Yellow
    fawt: "#EE6677"                   # Red
    tlp: "#AA3377"                    # Purple (for future use)

  # Component contribution colors (expanded palette for many components)
  components:
    - "#4477AA"  # Blue
    - "#66CCEE"  # Cyan
    - "#228833"  # Green
    - "#CCBB44"  # Yellow
    - "#EE6677"  # Red
    - "#AA3377"  # Purple
    - "#BBBBBB"  # Grey
    - "#88CCEE"  # Light cyan
    - "#44AA99"  # Teal
    - "#999933"  # Olive

# Plot-specific settings
plots:
  gwp_breakdown:
    figsize: [6.5, 4.5]
    ylabel: "GWP (kg CO₂ eq)"
    xlabel: "Scenario"
    title: "Lifecycle GWP Breakdown by Phase"
    stacked: true
    show_total: true

  component_contribution:
    figsize: [6.5, 6.0]  # Taller for horizontal bars
    xlabel: "GWP (kg CO₂ eq)"
    ylabel: "Component"
    title: "Component-Level GWP Contribution"
    top_n: 15  # Show top 15 components by default

  scenario_comparison:
    figsize: [8.0, 4.5]  # Wider for multiple scenarios
    ylabel: "GWP Intensity (g CO₂ eq/kWh)"
    xlabel: "Scenario"
    title: "Scenario Comparison by GWP Intensity"
    bar_width: 0.8
